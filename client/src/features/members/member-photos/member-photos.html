@if(!memeberService.editMode()){

    @if(photos(); as photos){
    
        @if(photos.length>0){
                <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto">
                  
                    @for (photo of photos; track photo.id) {
                          <div class="relative">
                                <img src="{{photo.url}}" alt="photo of member" class="w-full rounded-lg">
                              @if(accountService.currentUser()?.id===memeberService.member()?.id){
                               <app-star-button
                                class="absolute top-1 right-1 "
                                [disabled]="photo.url===memeberService.member()?.imageUrl"
                                [selected]="photo.url===memeberService.member()?.imageUrl"
                                (clickEvent)="setMainPhoto(photo)"
                                />
                              <app-delete-button
                              [disabled]="photo.url===memeberService.member()?.imageUrl"
                              (clickEvent)="deletePhoto(photo.id)"
                               class="absolute top-1 left-1"/>
                              }     
                             
                          </div>
                        
                    }
                </div>
        }@else {
            <p class="text-center text-gray-500">No Photos available</p>
        }

    }
  
  
}@else {
    <app-image-upload (uploadFile)="onUploadImage($event)" [loading]="loading()" />
}
