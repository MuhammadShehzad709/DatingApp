@if(memberService.member();as member){
<div class="flex flex-col gap-3">
    <div class="flex gap-3">
        <span class="font-semibold">member since:</span>
        <span>{{member.createdAt |date:'longDate'}}</span>
    </div>
    <div class="flex gap-3">
        <span class="font-semibold">Last Active:</span>
        <span>{{member.lastActive |timeAgo}}</span>
    </div>
    <h3 class="text-lg font-semibold text-primary">About {{member.displayName}}</h3>
    @if(memberService.editMode()){
     <form #editFrom="ngForm" (ngSubmit)="updateProfile()" class="flex flex-col w-full gap-4">
        <label class="floating-label">
            <span>displayName</span>
            <input type="text" [(ngModel)]="editableMember.displayName" class="input w-full"  name="displayName" placeholder="DisplayName">
        </label>
           <label class="floating-label">
            <span>description</span>
            <textarea type="text" [(ngModel)]="editableMember.description" class="textarea w-full"  name="description" placeholder="Description"></textarea>
        </label>
           <label class="floating-label">
            <span>city</span>
            <input type="text" [(ngModel)]="editableMember.city" class="input w-full"  name="city" placeholder="City">
        </label>
           <label class="floating-label">
            <span>country</span>
            <input type="text" [(ngModel)]="editableMember.country" class="input w-full"  name="country" placeholder="Country">
        </label>
        <div class="flex self-end">
            <button [disabled]="!editForm?.dirty" type="submit" class="btn btn-success">Submit</button>
        </div>
     </form>
    }
    @else {
    <div>{{member.description}}</div>
    }


</div>
}
